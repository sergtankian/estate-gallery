<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Estate Gallery</title>

<style>

body{
font-family:Arial;
margin:40px;
background:#f5f5f5;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:25px;
}

.item{
background:white;
padding:12px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.item img{
width:100%;
border-radius:5px;
cursor:pointer;
transition:transform 0.2s;
}

.item img:hover{
transform:scale(1.03);
}

button{
margin-top:8px;
width:100%;
padding:8px;
border:none;
background:#3a7bd5;
color:white;
border-radius:5px;
}

.claimed{
opacity:0.5;
}

#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

#lightbox img{
max-width:90%;
max-height:90%;
}
</style>

</head>

<body>

<h1>Estate Items</h1>

<div class="gallery" id="gallery"></div>

<script>

function openLightbox(src){
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").style.display = "flex";
}

function closeLightbox(){
  document.getElementById("lightbox").style.display = "none";
}


const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRZT83ByUuJMkJy1u5zNa2cgbsaQYXr3ESks5jXjyDdW_v-SeK35tAbl83UyoAfIgL-vQcTnIY2wGE8/pub?output=csv";

fetch(sheetURL)
.then(response => response.text())
.then(data => {

const rows = data.split("\n").slice(1);

const gallery = document.getElementById("gallery");

rows.forEach(row => {

const [name,room,photo,form,status] = row.split(",");

const item = document.createElement("div");

item.className = "item";

if(status === "Claimed"){
item.classList.add("claimed");
}

item.innerHTML = `
<img src="photos/${photo}" onclick="openLightbox(this.src)">
<p><b>${name}</b></p>
<p>${room}</p>
<p>Status: ${status}</p>
<a href="${form}" target="_blank">
<button>Claim Item</button>
</a>
`;

gallery.appendChild(item);

});

});

</script>
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>
</body>
</html>
