<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Estate Gallery</title>

<style>

#filters{
margin-bottom:20px;
}

#filters button{
margin-right:8px;
padding:6px 12px;
cursor:pointer;
}
  
body{
font-family:Arial;
margin:40px;
background:#f5f5f5;
}

#gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}
  
.item{
background:white;
padding:12px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.item img{
width:100%;
height:180px;
object-fit:cover;
border-radius:5px;
cursor:pointer;
transition:transform 0.2s;
}

.item img:hover{
transform:scale(1.03);
}

button{
margin-top:8px;
width:100%;
padding:8px;
border:none;
background:#3a7bd5;
color:white;
border-radius:5px;
}

.claimed{
opacity:0.5;
}

#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

#lightbox img{
max-width:90%;
max-height:90%;
}
</style>

</head>

<body>

<h1>Estate Items</h1>

<input 
id="searchBox" 
type="text" 
placeholder="Search items..." 
onkeyup="searchItems()"
style="padding:8px;width:300px;margin-bottom:20px;"
>

<div id="filters"></div>
  
<div class="gallery" id="gallery"></div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRZT83ByUuJMkJy1u5zNa2cgbsaQYXr3ESks5jXjyDdW_v-SeK35tAbl83UyoAfIgL-vQcTnIY2wGE8/pub?output=csv";

const gallery = document.getElementById("gallery");
const filterContainer = document.getElementById("filters");

const rooms = new Set();

function openLightbox(src){
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").style.display = "flex";
}

function closeLightbox(){
  document.getElementById("lightbox").style.display = "none";
}

function filterRoom(room){

  const items = document.querySelectorAll(".item");

  items.forEach(item => {

    if(room === "All"){
      item.style.display = "block";
      return;
    }

    if(item.dataset.room === room){
      item.style.display = "block";
    } else {
      item.style.display = "none";
    }

  });

}

fetch(sheetURL)
.then(response => response.text())
.then(data => {

  const rows = data.split("\n").slice(1);

  rows.forEach(row => {

    if(!row.trim()) return;

    const [name,room,photo,form,status] = row.split(",");

    rooms.add(room);

    const item = document.createElement("div");
    item.className = "item";
    item.dataset.room = room;

    if(status === "Claimed"){
      item.classList.add("claimed");
    }

    item.innerHTML = `
      <img src="photos/${photo}" onclick="openLightbox(this.src)">
      <p><b>${name}</b></p>
      <p>${room}</p>
      <p>Status: ${status}</p>

      <a href="https://docs.google.com/forms/d/e/1FAIpQLSe8aJaO8yK07T_sZkMHWG-YLGN9cATdE7d-y_cxoR4n2c_9ag/viewform?usp=pp_url&entry.1358034698=${encodeURIComponent(name)}" target="_blank">
        <button>I'm Interested</button>
      </a>
    `;

    gallery.appendChild(item);

  });

  // Build filter buttons AFTER rooms are collected

  filterContainer.innerHTML = `<button onclick="filterRoom('All')">All</button>`;

  [...rooms].sort().forEach(room => {

    const button = document.createElement("button");

    button.textContent = room;

    button.onclick = () => filterRoom(room);

    filterContainer.appendChild(button);

  });

});

</script>
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>
</body>
</html>
