<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Estate Gallery</title>

<style>

#filters{
margin-bottom:20px;
display:flex;
flex-wrap:wrap;
gap:8px;
}

#filters button{
width:auto;
padding:6px 12px;
margin:0;
background:#232627;
border:1px solid #736b5e;
color:#e8e6e3;
border-radius:4px;
}

#filters button.active{
background:#3a3f42;
border-color:#aaa;
}
  
body{
font-family:Arial;
margin:40px;
background:#181a1b;
color:#e8e6e3;
}

#gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}
  
.item{
background:#232627;
padding:12px;
border-radius:8px;
border:1px solid #736b5e;
box-shadow:0 2px 6px rgba(0,0,0,0.6);
}

.item:hover{
transform:translateY(-4px);
box-shadow:0 6px 14px rgba(0,0,0,0.7);
}

.item img{
width:100%;
height:180px;
object-fit:cover;
border-radius:5px;
cursor:pointer;
transition:transform 0.2s;
}

.item img:hover{
transform:scale(1.03);
}

button{
margin-top:8px;
width:100%;
padding:8px;
border:none;
background:#3a7bd5;
color:white;
border-radius:5px;
}

button:hover{
background:#3a3f42;
}

button:disabled{
background:#999;
cursor:not-allowed;
}
  
.claimed{
opacity:0.5;
filter:grayscale(70%);
}

#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

#lightbox img{
max-width:90%;
max-height:90%;
}

#searchBox{
padding:8px;
width:300px;
margin-bottom:20px;
font-size:14px;
background:#232627;
color:#e8e6e3;
border:1px solid #736b5e;
}
  
</style>

</head>

<body>

<h1>Estate Items</h1>

<input id="searchBox" type="text" placeholder="Search items..." onkeyup="searchItems()">

<div id="filters"></div>
  
<div class="gallery" id="gallery"></div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRZT83ByUuJMkJy1u5zNa2cgbsaQYXr3ESks5jXjyDdW_v-SeK35tAbl83UyoAfIgL-vQcTnIY2wGE8/pub?output=csv";

const gallery = document.getElementById("gallery");
const filterContainer = document.getElementById("filters");

const rooms = new Set();

/* NEW: remember selected room */
let currentRoom = "All";

function openLightbox(src){
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").style.display = "flex";
}

function closeLightbox(){
  document.getElementById("lightbox").style.display = "none";
}


/* UPDATED: room filter now stores selection */
function filterRoom(room){

  currentRoom = room;

  applyFilters();

}


/* UPDATED: search now uses shared filter logic */
function searchItems(){

  applyFilters();

}


/* NEW: master filter function */
function applyFilters(){

  const query = document.getElementById("searchBox").value.toLowerCase();

  const items = document.querySelectorAll(".item");

  items.forEach(item => {

    const text = item.innerText.toLowerCase();

    const matchesSearch = text.includes(query);
    const matchesRoom = (currentRoom === "All" || item.dataset.room === currentRoom);

    if(matchesSearch && matchesRoom){
      item.style.display = "";
    } else {
      item.style.display = "none";
    }

  });

}


fetch(sheetURL)
.then(response => response.text())
.then(data => {

  const rows = data.split("\n").slice(1);

  rows.forEach(row => {

    if(!row.trim()) return;

    const [name,room,photo,form,status] = row.split(",").map(x => x.trim());

    rooms.add(room);

    const item = document.createElement("div");
    item.className = "item";
    item.dataset.room = room;

    if(status === "Claimed"){
      item.classList.add("claimed");
    }

   let buttonHTML = `
<a href="https://docs.google.com/forms/d/e/1FAIpQLSe8aJaO8yK07T_sZkMHWG-YLGN9cATdE7d-y_cxoR4n2c_9ag/viewform?usp=pp_url&entry.1358034698=${encodeURIComponent(name)}" target="_blank">
<button>I'm Interested</button>
</a>
`;

if(status === "Claimed"){
buttonHTML = `<button disabled>Claimed</button>`;
}

item.innerHTML = `
<img loading="lazy" src="photos/${photo}" onclick="openLightbox(this.src)">
<p><b>${name}</b></p>
<p>${room}</p>
<p>Status: ${status}</p>
${buttonHTML}
`;

    gallery.appendChild(item);

  });

  // Build filter buttons AFTER rooms are collected

  filterContainer.innerHTML = `<button class="active" onclick="filterRoom('All')">All</button>`;

  [...rooms].sort().forEach(room => {

    const button = document.createElement("button");

    button.textContent = room;

    button.onclick = () => { document.querySelectorAll("#filters button").forEach(b => b.classList.remove("active"));
  button.classList.add("active");
  filterRoom(room);

    filterContainer.appendChild(button);

  });

});

</script>
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>
</body>
</html>
